name: Create Daily Report

on:
  workflow_dispatch:
    inputs:
      report_date:
        description: "日付。空欄なら日本時間の今日 (YYYY-MM-DD)"
        required: false
        type: string
      topics:
        description: "学習内容。複数行で入力すると箇条書きになります"
        required: true
        type: string
      today_hours:
        description: "学習時間 Today。例: 1.5"
        required: true
        type: string
      memo:
        description: "学習メモ。空欄なら「特になし」"
        required: false
        type: string

permissions:
  contents: write

jobs:
  create:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create report
        id: report
        env:
          REPORT_DATE: ${{ inputs.report_date }}
          TOPICS: ${{ inputs.topics }}
          TODAY_HOURS: ${{ inputs.today_hours }}
          MEMO: ${{ inputs.memo }}
        run: |
          python scripts/create_daily_report.py \
            --date "$REPORT_DATE" \
            --topics "$TOPICS" \
            --hours "$TODAY_HOURS" \
            --memo "$MEMO"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${{ steps.report.outputs.report_path }}"
          git commit -m "${{ steps.report.outputs.commit_message }}"
          git push

      - name: Summary
        run: |
          {
            echo "## 日報を作成しました"
            echo ""
            echo "- File: ${{ steps.report.outputs.report_path }}"
            echo "- Previous total: ${{ steps.report.outputs.previous_total }}h"
            echo "- New total: ${{ steps.report.outputs.new_total }}h"
            echo "- Commit: ${{ steps.report.outputs.commit_message }}"
          } >> "$GITHUB_STEP_SUMMARY"
